<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Format paysage</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-wrapper {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }

    .game-screen {
      aspect-ratio: 16 / 9;
      width: 100vw;
      max-width: calc(100vh * 16 / 9);
      height: auto;
      max-height: 100vh;

      background: white;
      border: 2px solid #ddd;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: clamp(24px, 6vw, 72px);
      font-weight: bold;
      color: #111;
      text-align: center;
    }

    @media (orientation: portrait) {
      .game-screen {
        width: 100vw;
        height: calc(100vw * 9 / 16);
      }
    }

    @media (orientation: landscape) {
      .game-screen {
        height: 100vh;
        width: calc(100vh * 16 / 9);
      }
    }
  </style>
</head>

<body>
  <div class="game-wrapper">
    <main class="game-screen" id="gameScreen">
      format paysage
    </main>
  </div>

  <script>
    function resizeGameScreen() {
      const screen = document.getElementById("gameScreen");

      const windowRatio = window.innerWidth / window.innerHeight;
      const targetRatio = 16 / 9;

      if (windowRatio > targetRatio) {
        screen.style.height = "100vh";
        screen.style.width = "calc(100vh * 16 / 9)";
      } else {
        screen.style.width = "100vw";
        screen.style.height = "calc(100vw * 9 / 16)";
      }
    }

    window.addEventListener("resize", resizeGameScreen);
    window.addEventListener("orientationchange", resizeGameScreen);

    resizeGameScreen();
  </script>
</body>
</html>
